[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [{ id = "check-yaml" }, { id = "end-of-file-fixer" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.13"
hooks = [
  { id = "ruff-check", args = ["--fix"], exclude = "^stubgen/" },
  { id = "ruff-format", exclude = "^stubgen/" },
]

[[repos]]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "v4.10.0"
hooks = [{ id = "commitizen", stages = ["commit-msg"] }]

[[repos]]
repo = "local"
hooks = [
  { id = "ty", name = "ty check", entry = "uv run ty check .", language = "system", pass_filenames = false },
  { id = "pytest", name = "pytest", entry = "uv run pytest tests/", language = "system", pass_filenames = false, stages = ["pre-push"] },
]
