name: CI Tests & Compatibility

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-unit-tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run ty check .

      - name: Test
        run: uv run pytest tests/ -v

      - name: Build package
        run: uv build

  golden-files-check:
    name: Golden files up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check goldens are up-to-date
        run: uv run python -m tests.support.check_goldens_stale

  corpus-tests:
    name: Corpus (real-world packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Corpus test
        run: uv run pytest tests/ -v -m corpus

  e2e-nuitka:
    name: E2E Integration w/ Nuitka
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Stage vendored stubgen
        run: |
          mkdir -p vendored_output
          cp -r src/nuitka_stubgen/vendored/stubgen vendored_output/

      - name: Upload vendored stub artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendored-stub
          path: vendored_output/

      - name: Checkout Nuitka
        uses: actions/checkout@v6
        with:
          repository: Nuitka/Nuitka
          ref: main
          path: Nuitka

      - name: Replace Nuitka's stubgen with our vendored stubgen
        run: |
          rm -rf Nuitka/nuitka/build/inline_copy/stubgen/*
          cp -r vendored_output/stubgen/* Nuitka/nuitka/build/inline_copy/stubgen/

      - name: Install Nuitka in current virtualenv
        run: uv pip install ./Nuitka

      - name: Run E2E Integration Test (Compile Module & Verify Stubgen)
        run: |
          echo "def add(x: int, y: int) -> int: return x + y" > test_module.py
          uv run python -m nuitka --mode=module test_module.py
          if [ ! -f test_module.pyi ]; then
            echo "Error: test_module.pyi was not generated!"
            exit 1
          fi
          cat test_module.pyi
          if ! grep -q "def add" test_module.pyi; then
            echo "Error: Generated stub does not contain 'def add'!"
            exit 1
          fi

      - name: Run Nuitka basic tests
        run: |
          cd Nuitka
          uv run python ./tests/run-tests --no-other-python --skip-reflection-test --skip-all-cpython-tests --skip-standalone-tests --skip-onefile-tests --skip-optimizations-tests --assume-yes-for-downloads

  compat-verify-vendored:
    name: Vendored stubgen on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    container: python:${{ matrix.python-version }}-slim
    strategy:
      matrix:
        python-version:
          - "3.5"
          - "3.6"
          - "3.7"
          - "3.8"

    steps:
      - uses: actions/checkout@v6

      - name: Run legacy fixture tests
        run: >
          python tests/run_vendor_py35.py
          src/nuitka_stubgen/vendored/stubgen
          tests/fixtures/cases/ast
